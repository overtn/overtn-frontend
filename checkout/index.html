<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OVERTN — Оформление заказа</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;600;700&family=Unbounded:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <main class="checkout-layout container">
      <header class="checkout-topbar">
        <button type="button" class="checkout-nav-btn" data-go-back>←</button>
        <h1>Ваш заказ</h1>
        <button type="button" class="checkout-nav-btn" data-go-back>✕</button>
      </header>

      <div class="checkout-grid">
        <section class="checkout-form-col">
          <form id="checkout-form" class="checkout-form" novalidate>
            <div class="form-row">
              <label>
                Email
                <input type="email" name="email" placeholder="overtn@yandex.ru" required data-email />
              </label>
              <div class="muted form-error" data-email-error>Введите корректный email.</div>
            </div>

            <div class="form-row">
              <label>Телефон</label>
              <div class="input-shell phone-row">
                <span class="phone-prefix">+7</span>
                <input
                  type="tel"
                  name="phoneLocal"
                  placeholder="(000) 000-00-00"
                  inputmode="numeric"
                  autocomplete="tel"
                  required
                  data-phone
                />
              </div>
              <div class="muted form-error" data-phone-error>Введите корректный номер телефона.</div>
            </div>

            <div class="checkout-block">
              <h2>Доставка</h2>
              <div class="form-row">
                <label>
                  Получатель (ФИО полностью)
                  <input
                    type="text"
                    name="recipientFullName"
                    placeholder="Иванов Иван Иванович"
                    pattern="^[A-Za-zА-Яа-яЁё-]+(?:\\s+[A-Za-zА-Яа-яЁё-]+)+$"
                    required
                    data-recipient-name
                  />
                </label>
              </div>
              <div class="form-row">
                <label>
                  Город
                  <div class="input-shell search-field">
                    <span>⌕</span>
                    <input type="text" name="city" placeholder="Введите город" autocomplete="off" required data-city />
                    <button type="button" class="input-clear" data-city-clear aria-label="Очистить">×</button>
                  </div>
                </label>
                <div class="autocomplete" data-city-autocomplete hidden>
                  <div class="autocomplete-list" data-city-list></div>
                  <div class="autocomplete-empty muted" data-city-empty hidden>По вашему запросу ничего не найдено</div>
                </div>
                <div class="muted" data-city-preview>Россия, г. —</div>
                <div class="muted form-error" data-shipping-error></div>
              </div>

              <div class="delivery-options" data-shipping-methods hidden>
                <label class="radio-row">
                  <input type="radio" name="shippingMethod" value="PVZ" data-shipping-method disabled />
                  <span>СДЭК — до пункта выдачи</span>
                </label>
                <div class="form-row" data-pvz-fields hidden>
                  <label>
                    Пункт получения
                    <div class="input-shell search-field">
                      <span>⌕</span>
                      <input type="text" name="pvzAddress" placeholder="Выберите пункт выдачи" autocomplete="off" data-pvz-address />
                      <button type="button" class="input-clear" data-pvz-clear aria-label="Очистить">×</button>
                    </div>
                  </label>
                  <div class="autocomplete" data-pvz-autocomplete hidden>
                    <div class="autocomplete-list" data-pvz-list></div>
                    <div class="autocomplete-empty muted" data-pvz-empty hidden>По вашему запросу ничего не найдено</div>
                  </div>
                  <div class="muted form-error" data-pvz-error></div>
                </div>
                <div class="checkout-block pvz-info" data-pvz-info hidden>
                  <h3>О пункте выдачи</h3>
                  <div class="muted" data-pvz-info-text></div>
                </div>

                <label class="radio-row">
                  <input type="radio" name="shippingMethod" value="COURIER" data-shipping-method disabled />
                  <span>СДЭК — курьером до двери</span>
                </label>
                <div class="form-row" data-courier-fields hidden>
                  <div class="form-inline">
                    <label>Улица <input type="text" name="street" data-courier-street /></label>
                  </div>
                  <div class="form-inline two-cols">
                    <label>Дом <input type="text" name="house" data-courier-house /></label>
                    <label>Квартира/Офис <input type="text" name="flat" data-courier-flat /></label>
                  </div>
                </div>
                <div class="muted" data-shipping-quote>Выберите город и способ доставки.</div>
              </div>
            </div>

            <div class="checkout-block">
              <h2>Сертификат / Промокод</h2>
              <div class="form-row">
                <div class="promo-row">
                  <input type="text" placeholder="Введите промокод" data-promo-input />
                  <button type="button" data-promo-apply>Применить</button>
                </div>
                <div class="muted" data-promo-result></div>
              </div>
            </div>

            <label class="checkbox-row">
              <input type="checkbox" required data-consent />
              <span>Я даю согласие на обработку моих персональных данных в соответствии с политикой конфиденциальности.</span>
            </label>

            <button class="cta checkout-submit" type="submit" disabled data-submit>Оформить заказ</button>
            <div class="muted" data-checkout-result></div>
            <div class="muted form-error" data-checkout-error></div>
          </form>
        </section>

        <aside class="checkout-order-col">
          <div class="checkout-order-list" data-order-items></div>
          <div class="checkout-summary">
            <div><span>Товары</span><strong data-subtotal>0 RUB</strong></div>
            <div><span>Доставка</span><strong data-shipping>—</strong></div>
            <div class="muted checkout-summary-detail" data-shipping-summary></div>
            <div data-discount-row hidden><span>Скидка</span><strong data-discount>0 RUB</strong></div>
            <div class="checkout-total"><span>Итого</span><strong data-total>0 RUB</strong></div>
          </div>
        </aside>
      </div>
    </main>

    <script src="/js/config.js"></script>
    <script>
      const cartKey = "brand-cart";
      const form = document.getElementById("checkout-form");
      const orderItemsEl = document.querySelector("[data-order-items]");
      const subtotalEl = document.querySelector("[data-subtotal]");
      const shippingEl = document.querySelector("[data-shipping]");
      const shippingSummaryEl = document.querySelector("[data-shipping-summary]");
      const discountRow = document.querySelector("[data-discount-row]");
      const discountEl = document.querySelector("[data-discount]");
      const totalEl = document.querySelector("[data-total]");
      const submitBtn = document.querySelector("[data-submit]");
      const checkoutResult = document.querySelector("[data-checkout-result]");
      const checkoutError = document.querySelector("[data-checkout-error]");
      const cityInput = document.querySelector("[data-city]");
      const cityPreview = document.querySelector("[data-city-preview]");
      const cityClearBtn = document.querySelector("[data-city-clear]");
      const cityDropdown = document.querySelector("[data-city-autocomplete]");
      const cityList = document.querySelector("[data-city-list]");
      const cityEmpty = document.querySelector("[data-city-empty]");
      const shippingErrorEl = document.querySelector("[data-shipping-error]");
      const shippingQuoteEl = document.querySelector("[data-shipping-quote]");
      const shippingMethodsWrap = document.querySelector("[data-shipping-methods]");
      const phoneInput = document.querySelector("[data-phone]");
      const emailInput = document.querySelector("[data-email]");
      const emailError = document.querySelector("[data-email-error]");
      const phoneError = document.querySelector("[data-phone-error]");
      const shippingRadios = Array.from(document.querySelectorAll("[data-shipping-method]"));
      const pvzFields = document.querySelector("[data-pvz-fields]");
      const pvzInput = document.querySelector("[data-pvz-address]");
      const pvzClearBtn = document.querySelector("[data-pvz-clear]");
      const pvzDropdown = document.querySelector("[data-pvz-autocomplete]");
      const pvzList = document.querySelector("[data-pvz-list]");
      const pvzEmpty = document.querySelector("[data-pvz-empty]");
      const pvzErrorEl = document.querySelector("[data-pvz-error]");
      const pvzInfoWrap = document.querySelector("[data-pvz-info]");
      const pvzInfoText = document.querySelector("[data-pvz-info-text]");
      const courierFields = document.querySelector("[data-courier-fields]");
      const recipientInput = document.querySelector("[data-recipient-name]");
      const streetInput = document.querySelector("[data-courier-street]");
      const houseInput = document.querySelector("[data-courier-house]");
      const flatInput = document.querySelector("[data-courier-flat]");
      const consentInput = document.querySelector("[data-consent]");
      const promoInput = document.querySelector("[data-promo-input]");
      const promoApplyBtn = document.querySelector("[data-promo-apply]");
      const promoResult = document.querySelector("[data-promo-result]");

      const touched = { email: false, phone: false, city: false, pvz: false };
      let submitted = false;
      let appliedPromo = null;
      let selectedCity = null;
      let selectedPvz = null;
      let shippingQuote = null;
      let quoteRequestId = 0;

      const autocompleteState = {
        city: { items: [], filtered: [], visibleCount: 20, activeIndex: -1, controller: null, requestSeq: 0 },
        pvz: { items: [], filtered: [], visibleCount: 20, activeIndex: -1, controller: null, requestSeq: 0 },
      };

      const getCart = () => JSON.parse(localStorage.getItem(cartKey) || "[]");
      const setCart = (cart) => localStorage.setItem(cartKey, JSON.stringify(cart));
      const formatRub = (value) => `${Math.max(0, value).toLocaleString("ru-RU")} RUB`;
      const normalizePhone = (digits10) => `7${digits10}`;
      const getShippingMethod = () => form.shippingMethod?.value || "";
      const parsePhoneDigits = (value) => (value || "").replace(/\D/g, "").slice(0, 10);
      const getSubtotal = () => getCart().reduce((sum, item) => sum + Number(item.numericPrice || 0) * Number(item.qty || 0), 0);
      const getDiscount = () => (appliedPromo ? Math.round((getSubtotal() * appliedPromo.discountPercent) / 100) : 0);
      const normalizeQuery = (value) => (value || "").trim().replace(/\s+/g, " ");

      const debounceWithAbort = (key, fn, wait = 300) => {
        let timer = null;
        return (...args) => {
          clearTimeout(timer);
          timer = setTimeout(() => fn(...args), wait);
        };
      };

      const showFieldError = (kind, show) => {
        if (kind === "email") emailError.style.display = show ? "block" : "none";
        if (kind === "phone") phoneError.style.display = show ? "block" : "none";
      };

      const setInputClearState = (input, btn) => {
        if (!btn) return;
        btn.classList.toggle("show", Boolean(input.value.trim()));
      };

      const setResult = (text) => {
        checkoutResult.textContent = text || "";
        checkoutError.textContent = "";
      };

      const setError = (text) => {
        checkoutError.textContent = text || "";
        checkoutResult.textContent = "";
      };

      const showShippingError = (message) => {
        shippingErrorEl.textContent = message || "";
      };

      const showPvzError = (message) => {
        pvzErrorEl.textContent = message || "";
      };

      const formatPhoneLocal = (digits) => {
        if (!digits) return "";
        if (digits.length <= 3) return `(${digits}`;
        if (digits.length <= 6) return `(${digits.slice(0, 3)}) ${digits.slice(3)}`;
        if (digits.length <= 8) return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6)}`;
        return `(${digits.slice(0, 3)}) ${digits.slice(3, 6)}-${digits.slice(6, 8)}-${digits.slice(8, 10)}`;
      };

      const renderShippingSummaryText = () => {
        if (!selectedCity || !getShippingMethod()) return "";
        if (getShippingMethod() === "PVZ" && selectedPvz) {
          return [
            `ПВЗ ${selectedPvz.code || ""}`.trim(),
            selectedPvz.address || "",
            selectedPvz.workTime ? `Время: ${selectedPvz.workTime}` : "",
            selectedPvz.phone ? `Телефон: ${selectedPvz.phone}` : "",
          ].filter(Boolean).join("\\n");
        }
        if (getShippingMethod() === "COURIER") {
          const flatPart = flatInput.value.trim() ? `, кв ${flatInput.value.trim()}` : "";
          return `Курьер: г. ${selectedCity.name}, ${streetInput.value.trim()} ${houseInput.value.trim()}${flatPart}`;
        }
        return "";
      };

      const rerenderSummary = () => {
        const subtotal = getSubtotal();
        const shippingCost = shippingQuote?.shippingCostMinor ? Math.round(shippingQuote.shippingCostMinor / 100) : 0;
        const discount = getDiscount();
        const total = Math.max(subtotal - discount + shippingCost, 0);
        subtotalEl.textContent = formatRub(subtotal);
        shippingEl.textContent = shippingCost ? formatRub(shippingCost) : "—";
        shippingSummaryEl.textContent = renderShippingSummaryText();
        discountRow.hidden = discount <= 0;
        discountEl.textContent = `-${formatRub(discount)}`;
        totalEl.textContent = formatRub(total);
      };

      const rerenderOrder = () => {
        const cart = getCart();
        if (!cart.length) {
          orderItemsEl.innerHTML = `<div class="muted">Корзина пуста.</div>`;
          rerenderSummary();
          validateForm();
          return;
        }

        orderItemsEl.innerHTML = cart.map((item) => {
          const lineTotal = Number(item.numericPrice || 0) * Number(item.qty || 0);
          return `<div class="checkout-item" data-item-id="${item.id}" data-item-size="${item.size || ""}">
            <img src="${item.image}" alt="${item.name}" />
            <div class="checkout-item-meta">
              <strong>${item.name}</strong>
              <span>${formatRub(Number(item.numericPrice || 0))} × ${item.qty}</span>
              <span><b>${formatRub(lineTotal)}</b></span>
              <div class="checkout-item-actions">
                <button type="button" data-action="decrease">−</button>
                <button type="button" data-action="increase">+</button>
                <button type="button" data-action="remove">Удалить</button>
              </div>
            </div>
          </div>`;
        }).join("");
        rerenderSummary();
        validateForm();
      };

      const updateCartItem = (id, size, action) => {
        const cart = getCart();
        const item = cart.find((x) => x.id === id && (x.size || "") === (size || ""));
        if (!item) return;
        if (action === "increase") item.qty += 1;
        if (action === "decrease") item.qty -= 1;
        if (action === "remove" || item.qty <= 0) setCart(cart.filter((x) => !(x.id === id && (x.size || "") === (size || ""))));
        else setCart(cart);
        shippingQuote = null;
        rerenderOrder();
        void requestQuote();
      };

      const autoSelectByExactLabel = (items, value) => {
        const needle = normalizeQuery(value).toLocaleLowerCase("ru-RU");
        if (!needle) return null;
        return items.find((item) => {
          const label = String(item.label || item.name || "").toLocaleLowerCase("ru-RU");
          return label === needle;
        }) || null;
      };

      const renderAutocomplete = (key) => {
        const isCity = key === "city";
        const state = autocompleteState[key];
        const listEl = isCity ? cityList : pvzList;
        const emptyEl = isCity ? cityEmpty : pvzEmpty;
        const dropdownEl = isCity ? cityDropdown : pvzDropdown;

        const visible = state.filtered.slice(0, state.visibleCount);
        listEl.innerHTML = visible.map((item, index) => `
          <div class="autocomplete-item ${index === state.activeIndex ? "active" : ""}" data-idx="${index}">
            <div class="autocomplete-title">${item.title || item.name || item.label || ""}</div>
            <div class="autocomplete-subtitle">${item.subtitle || item.region || item.country || item.address || ""}</div>
          </div>
        `).join("");

        const hasItems = visible.length > 0;
        dropdownEl.hidden = !hasItems && !emptyEl.hidden;
        emptyEl.hidden = hasItems || normalizeQuery((isCity ? cityInput.value : pvzInput.value)).length === 0;

        if (hasItems || !emptyEl.hidden) dropdownEl.hidden = false;
      };

      const hideAutocomplete = (key) => {
        if (key === "city") cityDropdown.hidden = true;
        if (key === "pvz") pvzDropdown.hidden = true;
      };

      const selectCity = (item) => {
        selectedCity = item;
        cityInput.value = item.label || item.name;
        cityPreview.textContent = `Россия, г. ${item.name}`;
        shippingMethodsWrap.hidden = false;
        shippingRadios.forEach((radio) => { radio.disabled = false; });
        hideAutocomplete("city");
        showShippingError("");
        resetDeliverySelection();
        setInputClearState(cityInput, cityClearBtn);
        validateForm();
      };

      const selectPvz = (item) => {
        selectedPvz = item;
        pvzInput.value = item.label || item.address || item.code;
        pvzInfoWrap.hidden = false;
        pvzInfoText.textContent = [
          `Код: ${item.code || "—"}`,
          item.city ? `Город: ${item.city}` : "",
          `Адрес: ${item.address || "—"}`,
          item.workTime ? `Время работы: ${item.workTime}` : "",
          item.phone ? `Телефон: ${item.phone}` : "",
        ].filter(Boolean).join("\\n");
        hideAutocomplete("pvz");
        showPvzError("");
        setInputClearState(pvzInput, pvzClearBtn);
        rerenderSummary();
        void requestQuote();
        validateForm();
      };

      const setAutocompleteData = (key, rows) => {
        const state = autocompleteState[key];
        state.items = rows;
        state.filtered = rows;
        state.visibleCount = 20;
        state.activeIndex = rows.length ? 0 : -1;
        renderAutocomplete(key);
      };

      const loadCities = debounceWithAbort("city", async () => {
        const q = normalizeQuery(cityInput.value);
        if (q.length < 1) {
          setAutocompleteData("city", []);
          hideAutocomplete("city");
          return;
        }

        const state = autocompleteState.city;
        state.requestSeq += 1;
        const reqId = state.requestSeq;
        if (state.controller) state.controller.abort();
        state.controller = new AbortController();
        try {
          const rows = await window.apiRequest(`/api/v1/shipping/cdek/cities?q=${encodeURIComponent(q)}`, { signal: state.controller.signal });
          if (reqId !== state.requestSeq) return;
          const mapped = (rows || []).map((row) => ({
            ...row,
            title: `г ${row.name}`,
            subtitle: [row.region, row.country].filter(Boolean).join(", "),
          }));
          setAutocompleteData("city", mapped);
        } catch (error) {
          if (error?.name === "AbortError") return;
          setAutocompleteData("city", []);
          hideAutocomplete("city");
          showShippingError("CDEK temporarily unavailable");
        }
      }, 300);

      const loadPvz = debounceWithAbort("pvz", async () => {
        if (!selectedCity?.code || getShippingMethod() !== "PVZ") return;
        const q = normalizeQuery(pvzInput.value);

        const state = autocompleteState.pvz;
        state.requestSeq += 1;
        const reqId = state.requestSeq;
        if (state.controller) state.controller.abort();
        state.controller = new AbortController();

        try {
          const rows = await window.apiRequest(`/api/v1/shipping/cdek/pvz?cityCode=${encodeURIComponent(selectedCity.code)}&q=${encodeURIComponent(q)}&size=200`, { signal: state.controller.signal });
          if (reqId !== state.requestSeq) return;
          const mapped = (rows || []).map((row) => ({
            ...row,
            label: row.label || [row.name, row.address].filter(Boolean).join(" — "),
            title: row.name || row.code,
            subtitle: row.address || row.city || "",
          }));
          setAutocompleteData("pvz", mapped);
        } catch (error) {
          if (error?.name === "AbortError") return;
          setAutocompleteData("pvz", []);
          hideAutocomplete("pvz");
          showPvzError("CDEK temporarily unavailable");
        }
      }, 300);

      const onAutocompleteScroll = (key, event) => {
        const state = autocompleteState[key];
        const target = event.target;
        if (!(target instanceof HTMLElement)) return;
        if (target.scrollHeight - target.scrollTop - target.clientHeight < 40) {
          if (state.visibleCount < state.filtered.length) {
            state.visibleCount += 20;
            renderAutocomplete(key);
          }
        }
      };

      const handleAutocompleteKeydown = (key, event) => {
        const state = autocompleteState[key];
        const max = Math.min(state.filtered.length, state.visibleCount) - 1;
        if (max < 0) return;
        if (event.key === "ArrowDown") {
          event.preventDefault();
          state.activeIndex = Math.min(max, state.activeIndex + 1);
          renderAutocomplete(key);
        }
        if (event.key === "ArrowUp") {
          event.preventDefault();
          state.activeIndex = Math.max(0, state.activeIndex - 1);
          renderAutocomplete(key);
        }
        if (event.key === "Enter") {
          event.preventDefault();
          const item = state.filtered[state.activeIndex];
          if (item) {
            if (key === "city") selectCity(item);
            else selectPvz(item);
          }
        }
        if (event.key === "Escape") {
          hideAutocomplete(key);
        }
      };

      const resetDeliverySelection = () => {
        shippingRadios.forEach((radio) => {
          radio.checked = false;
        });
        selectedPvz = null;
        pvzInput.value = "";
        pvzInfoWrap.hidden = true;
        pvzInfoText.textContent = "";
        streetInput.value = "";
        houseInput.value = "";
        flatInput.value = "";
        shippingQuote = null;
        syncShippingFields();
      };

      const syncShippingFields = () => {
        const method = getShippingMethod();
        const citySelected = Boolean(selectedCity?.code);
        shippingMethodsWrap.hidden = !citySelected;

        pvzFields.hidden = method !== "PVZ";
        courierFields.hidden = method !== "COURIER";
        pvzInfoWrap.hidden = method !== "PVZ" || !selectedPvz;

        pvzInput.required = method === "PVZ";
        streetInput.required = method === "COURIER";
        houseInput.required = method === "COURIER";

        if (method !== "PVZ") {
          selectedPvz = null;
          pvzInput.value = "";
          showPvzError("");
        }

        if (!citySelected || !method) shippingQuote = null;
        rerenderSummary();
        validateForm();
        void requestQuote();
      };

      const buildQuotePayload = () => {
        const cart = getCart();
        if (!cart.length || !selectedCity || !getShippingMethod()) return null;
        const items = cart.map((item) => ({ variantId: item.variantId, qty: item.qty || 1 })).filter((item) => item.variantId);
        if (!items.length) return null;
        const method = getShippingMethod();
        if (method === "PVZ" && !selectedPvz?.code) return null;
        if (method === "COURIER" && (!streetInput.value.trim() || !houseInput.value.trim())) return null;
        return {
          method,
          cityCode: selectedCity.code,
          pvzCode: method === "PVZ" ? selectedPvz.code : undefined,
          address: method === "COURIER" ? {
            street: streetInput.value.trim(),
            house: houseInput.value.trim(),
            flat: flatInput.value.trim() || undefined,
          } : undefined,
          items,
        };
      };

      const requestQuote = async () => {
        const payload = buildQuotePayload();
        if (!payload) {
          shippingQuote = null;
          shippingQuoteEl.textContent = selectedCity ? "Заполните данные доставки для расчета." : "Выберите город и способ доставки.";
          rerenderSummary();
          validateForm();
          return;
        }
        const requestId = ++quoteRequestId;
        shippingQuoteEl.textContent = "Рассчитываем доставку…";
        showShippingError("");
        try {
          const quote = await window.apiRequest("/api/v1/shipping/cdek/quote", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
          if (requestId !== quoteRequestId) return;
          shippingQuote = quote;
          const days = quote.deliveryDaysMin && quote.deliveryDaysMax
            ? `${quote.deliveryDaysMin}-${quote.deliveryDaysMax} дней`
            : "срок уточняется";
          shippingQuoteEl.textContent = `Доставка: ${formatRub(Math.round(quote.shippingCostMinor / 100))}, ${days}.`;
          rerenderSummary();
          validateForm();
        } catch (error) {
          if (requestId !== quoteRequestId) return;
          shippingQuote = null;
          shippingQuoteEl.textContent = "Не удалось рассчитать доставку. Попробуйте позже.";
          showShippingError("Не удалось рассчитать доставку. Попробуйте позже.");
          rerenderSummary();
          validateForm();
        }
      };

      const isValidEmail = () => /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test((emailInput.value || "").trim());
      const isValidPhone = () => parsePhoneDigits(phoneInput.value).length === 10;
      const isRecipientValid = () => /^[A-Za-zА-Яа-яЁё-]+(?:\s+[A-Za-zА-Яа-яЁё-]+)+$/.test((recipientInput.value || "").trim());

      const validateForm = () => {
        const method = getShippingMethod();
        const emailOk = isValidEmail();
        const phoneOk = isValidPhone();
        const cityOk = Boolean(selectedCity?.code);
        const methodOk = cityOk ? (method === "PVZ" || method === "COURIER") : true;
        const pvzOk = method !== "PVZ" || Boolean(selectedPvz?.code);
        const courierOk = method !== "COURIER" || (Boolean(streetInput.value.trim()) && Boolean(houseInput.value.trim()));
        const consentOk = consentInput.checked;
        const recipientOk = isRecipientValid();
        const cartOk = getCart().length > 0;
        const shippingOk = method ? Boolean(shippingQuote?.shippingCostMinor) : false;
        submitBtn.disabled = !(emailOk && phoneOk && cityOk && methodOk && pvzOk && courierOk && consentOk && cartOk && shippingOk && recipientOk);

        showFieldError("email", (submitted || touched.email) && !emailOk);
        showFieldError("phone", (submitted || touched.phone) && !phoneOk);
        if ((submitted || touched.city) && !cityOk) showShippingError("Пожалуйста, выберите город из предложенных вариантов");
        if ((submitted || touched.pvz) && method === "PVZ" && !pvzOk) showPvzError("Пожалуйста, выберите пункт выдачи из предложенных вариантов");
      };

      const getShippingPayload = () => {
        const method = getShippingMethod();
        const payload = {
          method,
          cityCode: selectedCity.code,
          cityName: selectedCity.name,
          recipientFullName: recipientInput.value.trim(),
          shippingCostMinor: shippingQuote.shippingCostMinor,
          deliveryDaysMin: shippingQuote.deliveryDaysMin ?? undefined,
          deliveryDaysMax: shippingQuote.deliveryDaysMax ?? undefined,
          serviceName: shippingQuote.serviceName || undefined,
          tariffCode: shippingQuote.tariffCode || undefined,
        };
        if (method === "PVZ") {
          payload.pvzCode = selectedPvz.code;
          payload.pvzAddress = selectedPvz.address || selectedPvz.label;
        } else {
          payload.address = {
            street: streetInput.value.trim(),
            house: houseInput.value.trim(),
            flat: flatInput.value.trim() || undefined,
          };
        }
        return payload;
      };

      const applyPromo = async () => {
        const code = (promoInput.value || "").trim();
        if (!code) {
          appliedPromo = null;
          promoResult.textContent = "";
          rerenderSummary();
          return;
        }
        try {
          const subtotalMinor = Math.round(getSubtotal() * 100);
          const result = await window.apiRequest("/api/v1/checkout/promocodes/validate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ code, subtotalMinor }),
          });
          appliedPromo = { code: result.code, discountPercent: result.discountPercent };
          promoResult.textContent = `Промокод ${result.code} применен: -${result.discountPercent}%`;
          rerenderSummary();
        } catch (error) {
          appliedPromo = null;
          promoResult.textContent = error?.message || "Не удалось применить промокод";
          rerenderSummary();
        }
      };

      document.querySelectorAll("[data-go-back]").forEach((btn) => btn.addEventListener("click", () => {
        if (window.history.length > 1) window.history.back();
        else window.location.href = "/";
      }));

      orderItemsEl.addEventListener("click", (event) => {
        const button = event.target.closest("button[data-action]");
        if (!button) return;
        const row = button.closest("[data-item-id]");
        updateCartItem(row.dataset.itemId, row.dataset.itemSize, button.dataset.action);
      });

      cityList.addEventListener("click", (event) => {
        const itemEl = event.target.closest(".autocomplete-item");
        if (!itemEl) return;
        const index = Number(itemEl.dataset.idx);
        const item = autocompleteState.city.filtered[index];
        if (item) selectCity(item);
      });

      pvzList.addEventListener("click", (event) => {
        const itemEl = event.target.closest(".autocomplete-item");
        if (!itemEl) return;
        const index = Number(itemEl.dataset.idx);
        const item = autocompleteState.pvz.filtered[index];
        if (item) selectPvz(item);
      });

      cityList.addEventListener("scroll", (event) => onAutocompleteScroll("city", event));
      pvzList.addEventListener("scroll", (event) => onAutocompleteScroll("pvz", event));

      cityInput.addEventListener("input", () => {
        selectedCity = null;
        shippingMethodsWrap.hidden = true;
        resetDeliverySelection();
        cityPreview.textContent = "Россия, г. —";
        loadCities();
        setInputClearState(cityInput, cityClearBtn);
        validateForm();
      });
      cityInput.addEventListener("focus", () => { loadCities(); });
      cityInput.addEventListener("blur", () => {
        touched.city = true;
        setTimeout(() => {
          const exact = autoSelectByExactLabel(autocompleteState.city.items, cityInput.value);
          if (exact) selectCity(exact);
          else {
            selectedCity = null;
            shippingMethodsWrap.hidden = true;
            resetDeliverySelection();
            showShippingError("Пожалуйста, выберите город из предложенных вариантов");
            validateForm();
          }
          hideAutocomplete("city");
        }, 120);
      });
      cityInput.addEventListener("keydown", (event) => handleAutocompleteKeydown("city", event));

      cityClearBtn?.addEventListener("click", () => {
        cityInput.value = "";
        selectedCity = null;
        cityPreview.textContent = "Россия, г. —";
        shippingMethodsWrap.hidden = true;
        resetDeliverySelection();
        hideAutocomplete("city");
        setInputClearState(cityInput, cityClearBtn);
        validateForm();
      });

      pvzInput.addEventListener("input", () => {
        selectedPvz = null;
        shippingQuote = null;
        pvzInfoWrap.hidden = true;
        showPvzError("");
        loadPvz();
        setInputClearState(pvzInput, pvzClearBtn);
        validateForm();
      });
      pvzInput.addEventListener("focus", () => { loadPvz(); });
      pvzInput.addEventListener("blur", () => {
        touched.pvz = true;
        setTimeout(() => {
          const exact = autoSelectByExactLabel(autocompleteState.pvz.items, pvzInput.value);
          if (exact) selectPvz(exact);
          else if (getShippingMethod() === "PVZ") {
            selectedPvz = null;
            showPvzError("Пожалуйста, выберите пункт выдачи из предложенных вариантов");
            validateForm();
          }
          hideAutocomplete("pvz");
        }, 120);
      });
      pvzInput.addEventListener("keydown", (event) => handleAutocompleteKeydown("pvz", event));

      pvzClearBtn?.addEventListener("click", () => {
        pvzInput.value = "";
        selectedPvz = null;
        pvzInfoWrap.hidden = true;
        shippingQuote = null;
        hideAutocomplete("pvz");
        setInputClearState(pvzInput, pvzClearBtn);
        validateForm();
      });

      shippingRadios.forEach((radio) => radio.addEventListener("change", syncShippingFields));
      [emailInput, recipientInput, streetInput, houseInput, flatInput].forEach((el) => el.addEventListener("input", () => {
        validateForm();
        if (el === streetInput || el === houseInput || el === flatInput) {
          void requestQuote();
          rerenderSummary();
        }
      }));
      consentInput.addEventListener("change", validateForm);

      emailInput.addEventListener("blur", () => { touched.email = true; validateForm(); });
      phoneInput.addEventListener("blur", () => { touched.phone = true; if (!phoneInput.value) phoneInput.placeholder = "(000) 000-00-00"; validateForm(); });

      phoneInput.addEventListener("focus", () => { phoneInput.placeholder = ""; });
      phoneInput.addEventListener("input", () => {
        const digits = parsePhoneDigits(phoneInput.value);
        phoneInput.value = formatPhoneLocal(digits);
        validateForm();
      });

      promoApplyBtn.addEventListener("click", applyPromo);

      document.addEventListener("click", (event) => {
        if (!event.target.closest("[data-city]") && !event.target.closest("[data-city-autocomplete]")) hideAutocomplete("city");
        if (!event.target.closest("[data-pvz-address]") && !event.target.closest("[data-pvz-autocomplete]")) hideAutocomplete("pvz");
      });

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        submitted = true;
        validateForm();
        if (submitBtn.disabled) return;

        const cart = getCart();
        const items = cart.map((item) => ({ variantId: item.variantId, qty: item.qty || 1 }));
        const shipping = getShippingPayload();
        const normalizedPhone = normalizePhone(parsePhoneDigits(phoneInput.value));
        const customerName = recipientInput.value.trim();
        const [firstName, ...lastNameParts] = customerName.split(/\s+/);
        const lastName = lastNameParts.join(" ");

        let wakeupTimer = null;
        try {
          submitBtn.disabled = true;
          setResult("Переходим к оплате…");
          wakeupTimer = setTimeout(() => setResult("Сервер просыпается, это может занять до минуты…"), 12000);
          const result = await window.apiRequest("/api/v1/checkout/orders", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              customerName,
              customerFirstName: firstName || "",
              customerLastName: lastName || "",
              customerEmail: emailInput.value.trim(),
              customerPhone: normalizedPhone,
              consentAccepted: true,
              items,
              shipping,
              promoCode: appliedPromo?.code || undefined,
            }),
          });
          clearTimeout(wakeupTimer);
          localStorage.removeItem(cartKey);
          if (result.confirmationUrl) {
            window.location.href = result.confirmationUrl;
            return;
          }
          setResult(`Заказ ${result.orderPublicId} создан.`);
        } catch (error) {
          clearTimeout(wakeupTimer);
          setError(error?.message || "Не удалось оформить заказ.");
          validateForm();
        }
      });

      rerenderOrder();
      syncShippingFields();
      setInputClearState(cityInput, cityClearBtn);
      setInputClearState(pvzInput, pvzClearBtn);
      validateForm();
    </script>
  </body>
</html>
