<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OVERTN — Оплата не завершена</title>
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div id="preloader">
      <img src="/assets/logo-preloader.png" alt="OVERTN" class="preloader-logo" />
    </div>
    <main class="checkout-page">
      <section class="checkout-card">
        <h1>Оплата не завершена</h1>
        <div class="muted">
          Платеж был отменен или не прошел. Попробуйте оформить заказ снова.
        </div>
        <div style="margin-top:16px; display:flex; gap:12px; flex-wrap:wrap;">
          <a href="/checkout/">Вернуться к оформлению</a>
          <a href="/">На главную</a>
        </div>
      </section>
    </main>
    <script src="/js/preloader.js"></script>
  </body>
</html>
