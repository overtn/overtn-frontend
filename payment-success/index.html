<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OVERTN — Оплата</title>
    <link rel="preconnect" href="https://api.overtn.ru" crossorigin />
    <link rel="dns-prefetch" href="//api.overtn.ru" />
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      .payment-return-link {
        color: #7f7f7f;
        text-decoration: underline;
        text-underline-offset: 5px;
      }
    </style>
  </head>
  <body>
    <div id="preloader">
      <img src="/assets/logo-preloader.png" alt="OVERTN" class="preloader-logo" />
    </div>
    <main class="checkout-page">
      <section class="checkout-card">
        <h1 data-title>Проверяем оплату…</h1>
        <div class="muted" data-status>Ожидаем подтверждение платежа.</div>
        <div class="muted" data-note style="margin-top:12px;"></div>
        <div style="margin-top:16px;">
          <a class="payment-return-link" href="/">Вернуться на главную</a>
        </div>
      </section>
    </main>

    <script src="/js/config.js"></script>
    <script src="/js/preloader.js"></script>
    <script>
      const titleEl = document.querySelector("[data-title]");
      const statusEl = document.querySelector("[data-status]");
      const noteEl = document.querySelector("[data-note]");
      const params = new URLSearchParams(window.location.search);
      const orderPublicId = params.get("order");

      const setState = ({ title, status, note = "" }) => {
        if (titleEl) titleEl.textContent = title;
        if (statusEl) statusEl.textContent = status;
        if (noteEl) noteEl.textContent = note;
      };

      const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      const check = async () => {
        if (!orderPublicId) {
          setState({
            title: "Не удалось загрузить статус заказа",
            status: "Не найден номер заказа.",
            note: "Попробуйте обновить страницу через несколько секунд.",
          });
          return;
        }

        setState({
          title: "Проверяем оплату…",
          status: "Ожидаем подтверждение платежа.",
          note: "",
        });

        let lastKnownStatus = "";
        for (let attempt = 0; attempt < 6; attempt += 1) {
          try {
            const order = await window.apiRequest(`/api/v1/checkout/orders/${encodeURIComponent(orderPublicId)}`);
            lastKnownStatus = order?.status || "";
            if (order?.status === "PAID") {
              setState({
                title: "Оплата успешно получена",
                status: "Ваш заказ принят",
                note: "Чек об оплате будет направлен на почту после обработки заказа.",
              });
              return;
            }
            if (order?.status === "CANCELLED") {
              window.location.href = `/payment-fail/?order=${encodeURIComponent(orderPublicId)}`;
              return;
            }
          } catch (error) {
            if (attempt === 5) {
              setState({
                title: "Не удалось загрузить статус заказа",
                status: "Попробуйте обновить страницу через несколько секунд.",
                note: "",
              });
              return;
            }
          }

          if (attempt < 5) {
            await wait(2000);
          }
        }

        setState({
          title: "Проверяем оплату…",
          status: lastKnownStatus
            ? `Статус заказа: ${lastKnownStatus}.`
            : "Статус заказа ещё обновляется.",
          note: "Если оплата уже прошла, обновите страницу через несколько секунд.",
        });
      };

      check();
    </script>
  </body>
  </html>
